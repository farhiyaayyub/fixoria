<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Job — Fixora</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="antialiased bg-gradient-to-b from-slate-50 via-white to-slate-50 text-slate-800">
    <div id="siteHeader"></div>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
      <div class="mb-6">
        <h1 class="text-3xl font-extrabold">Job Request</h1>
        <p class="text-slate-600 mt-1">Details for the selected job request and responses from providers.</p>
      </div>

      <div class="bg-white rounded-lg shadow p-6">
        <div id="jobContainer"></div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner px-4 sm:px-6 lg:px-8 py-6">
        <p>&copy; <span id="year"></span> Fixora — Connecting people with skilled local professionals.</p>
      </div>
    </footer>

    <script src="js/include.js" defer></script>
    <script src="js/app.js" defer></script>
    <script src="js/index-ui.js" defer></script>
    <script>
      document.addEventListener('DOMContentLoaded', function(){
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if(!id){ document.getElementById('jobContainer').innerHTML = '<div class="text-slate-500">No job id provided.</div>'; return }
        if(window.fixora && window.fixora.renderJobDetail) window.fixora.renderJobDetail('jobContainer', id);
      });
    </script>
  </body>
</html>
