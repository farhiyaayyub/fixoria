<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Jobs — Fixora</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-800">
    <div id="siteHeader"></div>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
      <h1 class="text-3xl font-semibold mb-4">Job Requests</h1>
      <p class="text-slate-600 mb-6">Browse all job requests posted on this demo site. For production, posts would be served from the server.</p>

      <section id="jobsList" class="space-y-4"></section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner px-4 sm:px-6 lg:px-8 py-6">
        <p>&copy; <span id="year"></span> Fixora</p>
      </div>
    </footer>

    <script src="js/include.js" defer></script>
    <script src="js/app.js" defer></script>
    <script>
      document.addEventListener('DOMContentLoaded', function(){
        if(window.fixora && window.fixora.renderJobsList) window.fixora.renderJobsList('jobsList', { limit: 0, showLink: true });
      });
    </script>
  </body>
</html>
